name: Build MK Encryptor APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip
          export PATH=$PWD/gradle-8.4/bin:$PATH
          gradle assembleDebug --no-daemon

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - uses: actions/upload-artifact@v4
        with:
          name: MK-Encryptor-Debug
          path: "**/*.apk"
          if-no-files-found: warn
